<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Omni MUN — NorCal Independent Delegation</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"><\/script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --charcoal:#2e3138;--charcoal-dark:#1a1d22;--off-white:#f4f2ee;
  --gold:#c9a84c;--gold-light:#e4c877;--white:#ffffff;--muted:#8a8d96;
  --serif:'Playfair Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--charcoal-dark);color:var(--off-white);min-height:100vh;overflow-x:hidden}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 3rem;height:70px;background:rgba(26,29,34,.9);backdrop-filter:blur(12px);border-bottom:1px solid rgba(201,168,76,.15)}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.nav-logo img{height:40px;width:40px;object-fit:contain}
.nav-wordmark{font-family:var(--serif);font-size:1.1rem;font-weight:700;color:var(--off-white)}
.nav-links{display:flex;align-items:center;gap:2rem;list-style:none}
.nav-links a{font-size:.85rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--gold)}
.nav-cta{background:var(--gold)!important;color:var(--charcoal-dark)!important;padding:8px 20px;border-radius:4px;font-weight:600!important}
.nav-cta:hover{background:var(--gold-light)!important;color:var(--charcoal-dark)!important}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.hamburger span{display:block;width:24px;height:2px;background:var(--off-white);border-radius:2px}
.mobile-menu{display:none;flex-direction:column;position:fixed;top:70px;left:0;right:0;background:var(--charcoal-dark);border-bottom:1px solid rgba(201,168,76,.15);padding:1.5rem 2rem;gap:1.2rem;z-index:99}
.mobile-menu.open{display:flex}
.mobile-menu a{font-size:1rem;font-weight:500;color:var(--off-white);text-decoration:none;letter-spacing:.05em;text-transform:uppercase}
.user-pill{display:none;align-items:center;gap:8px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);border-radius:50px;padding:6px 14px 6px 6px;cursor:pointer;transition:background .2s}
.user-pill:hover{background:rgba(201,168,76,.18)}
.user-pill.visible{display:flex}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:var(--charcoal-dark)}

/* HERO */
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px 2rem 80px;overflow:hidden}
.hero-rings{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.hero-rings::before,.hero-rings::after{content:'';position:absolute;border-radius:50%;border:1px solid rgba(201,168,76,.08)}
.hero-rings::before{width:700px;height:700px}
.hero-rings::after{width:1100px;height:1100px}
.hero-logo{width:140px;height:140px;object-fit:contain;margin-bottom:2rem;position:relative;z-index:1;animation:fadeUp .9s ease both}
.hero-eyebrow{font-size:.75rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;position:relative;z-index:1;animation:fadeUp .9s .1s ease both}
.hero-title{font-family:var(--serif);font-size:clamp(3rem,8vw,6rem);font-weight:900;line-height:1;color:var(--white);margin-bottom:1.5rem;position:relative;z-index:1;animation:fadeUp .9s .2s ease both}
.hero-title span{color:var(--gold)}
.hero-sub{font-size:1.1rem;font-weight:300;color:var(--muted);max-width:520px;line-height:1.7;margin-bottom:2.5rem;position:relative;z-index:1;animation:fadeUp .9s .3s ease both}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;position:relative;z-index:1;animation:fadeUp .9s .4s ease both}

/* BUTTONS */
.btn-primary{background:var(--gold);color:var(--charcoal-dark);font-family:var(--sans);font-size:.9rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:14px 32px;border-radius:4px;border:none;cursor:pointer;text-decoration:none;transition:background .2s,transform .1s;display:inline-block}
.btn-primary:hover{background:var(--gold-light);transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--off-white);font-family:var(--sans);font-size:.9rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:14px 32px;border-radius:4px;border:1px solid rgba(244,242,238,.25);cursor:pointer;text-decoration:none;transition:border-color .2s,color .2s;display:inline-block}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}

/* SECTIONS */
section{position:relative;z-index:1;padding:100px 2rem}
.container{max-width:1100px;margin:0 auto}
.section-label{font-size:.72rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:.8rem}
.section-title{font-family:var(--serif);font-size:clamp(2rem,4vw,3rem);font-weight:700;color:var(--white);line-height:1.15;margin-bottom:1rem}
.section-divider{width:48px;height:2px;background:var(--gold);margin-bottom:2.5rem}

/* ABOUT */
#about{background:var(--charcoal)}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center}
.about-text p{font-size:1rem;font-weight:300;color:rgba(244,242,238,.75);line-height:1.8;margin-bottom:1.2rem}
.about-stats{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.stat-card{background:var(--charcoal-dark);border:1px solid rgba(201,168,76,.15);border-radius:8px;padding:1.5rem;text-align:center}
.stat-num{font-family:var(--serif);font-size:2.5rem;font-weight:700;color:var(--gold);line-height:1;margin-bottom:.5rem}
.stat-label{font-size:.8rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}

/* CONFERENCES */
#conferences{background:var(--charcoal-dark)}
.conf-card{background:var(--charcoal);border:1px solid rgba(201,168,76,.2);border-radius:12px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr}
.conf-info{padding:3rem;border-right:1px solid rgba(201,168,76,.12)}
.conf-badge{display:inline-block;background:rgba(201,168,76,.15);color:var(--gold);font-size:.72rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;padding:5px 12px;border-radius:3px;margin-bottom:1.2rem}
.conf-title{font-family:var(--serif);font-size:2.2rem;font-weight:700;color:var(--white);margin-bottom:.5rem;line-height:1.1}
.conf-host{font-size:1rem;color:var(--gold-light);margin-bottom:1.5rem;font-weight:300}
.conf-details{list-style:none;display:flex;flex-direction:column;gap:.7rem;margin-bottom:2rem}
.conf-details li{display:flex;align-items:center;gap:10px;font-size:.9rem;color:rgba(244,242,238,.7)}
.conf-details li::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0}
.conf-register{padding:2rem 3rem;display:flex;flex-direction:column;justify-content:center;gap:.7rem}
.conf-register h3{font-family:var(--serif);font-size:1.4rem;color:var(--white);margin-bottom:.3rem}
.conf-register > p{font-size:.9rem;color:var(--muted);line-height:1.6;margin-bottom:.3rem}

/* FORMS */
.reg-form{display:flex;flex-direction:column;gap:.75rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.form-group input,.form-group select,.form-group textarea{background:var(--charcoal-dark);border:1px solid rgba(244,242,238,.12);border-radius:4px;padding:9px 12px;font-family:var(--sans);font-size:.88rem;color:var(--off-white);outline:none;transition:border-color .2s;width:100%}
.form-group input::placeholder,.form-group textarea::placeholder{color:var(--muted)}
.form-group select option{background:var(--charcoal-dark)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold)}
.form-group textarea{resize:vertical;min-height:70px}
.form-submit{background:var(--gold);color:var(--charcoal-dark);font-family:var(--sans);font-size:.88rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:12px;border-radius:4px;border:none;cursor:pointer;transition:background .2s;margin-top:.2rem}
.form-submit:hover{background:var(--gold-light)}
.form-submit:disabled{opacity:.6;cursor:not-allowed}
.form-success{display:none;text-align:center;padding:1.5rem;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.3);border-radius:8px;color:var(--gold-light);font-size:.95rem;line-height:1.6}

/* INSTAGRAM */
#instagram{background:var(--charcoal)}
.insta-placeholder{border:1px dashed rgba(201,168,76,.3);border-radius:12px;padding:4rem 2rem;text-align:center}
.insta-placeholder p{font-size:.95rem;color:var(--muted);line-height:1.7;max-width:480px;margin:0 auto}
.insta-icon{font-size:3rem;margin-bottom:1rem;opacity:.4}

/* FOOTER */
footer{background:rgba(0,0,0,.4);border-top:1px solid rgba(201,168,76,.12);padding:3rem 2rem;text-align:center;position:relative;z-index:1}
footer img{height:50px;margin-bottom:1rem;opacity:.7}
footer p{font-size:.82rem;color:var(--muted);line-height:1.7}
footer a{color:var(--gold);text-decoration:none}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,12,15,.88);z-index:200;align-items:center;justify-content:center;padding:2rem;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--charcoal);border:1px solid rgba(201,168,76,.2);border-radius:12px;width:100%;max-width:460px;padding:2.5rem;position:relative;animation:fadeUp .3s ease both;max-height:90vh;overflow-y:auto}
.modal-close{position:absolute;top:1.2rem;right:1.2rem;background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;line-height:1}
.modal-close:hover{color:var(--off-white)}
.modal h2{font-family:var(--serif);font-size:1.6rem;color:var(--white);margin-bottom:.3rem}
.modal-sub{font-size:.85rem;color:var(--muted);margin-bottom:1.8rem;line-height:1.5}
.modal-tabs{display:flex;margin-bottom:1.8rem;border-bottom:1px solid rgba(244,242,238,.1)}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;padding:8px 20px;font-family:var(--sans);font-size:.85rem;font-weight:500;color:var(--muted);cursor:pointer;transition:color .2s,border-color .2s;margin-bottom:-1px}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-panel{display:none}
.tab-panel.active{display:block}
.auth-form{display:flex;flex-direction:column;gap:.75rem}
.auth-form input,.auth-form select{background:var(--charcoal-dark);border:1px solid rgba(244,242,238,.12);border-radius:4px;padding:11px 14px;font-family:var(--sans);font-size:.9rem;color:var(--off-white);outline:none;width:100%;transition:border-color .2s}
.auth-form input::placeholder{color:var(--muted)}
.auth-form input:focus,.auth-form select:focus{border-color:var(--gold)}
.auth-form select option{background:var(--charcoal-dark)}
.auth-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.field-label{font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;display:block}
.auth-btn{background:var(--gold);color:var(--charcoal-dark);font-family:var(--sans);font-size:.9rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:13px;border-radius:4px;border:none;cursor:pointer;transition:background .2s;width:100%;margin-top:.3rem}
.auth-btn:hover{background:var(--gold-light)}
.auth-btn:disabled{opacity:.6;cursor:not-allowed}
.auth-note{font-size:.78rem;color:var(--muted);text-align:center;line-height:1.5;margin-top:.4rem}
.auth-note a{color:var(--gold);cursor:pointer;text-decoration:none}
.auth-error{display:none;font-size:.82rem;color:#e07070;background:rgba(224,112,112,.08);border:1px solid rgba(224,112,112,.2);border-radius:4px;padding:9px 12px}
.auth-error.show{display:block}
.auth-success{display:none;font-size:.85rem;color:var(--gold-light);background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);border-radius:4px;padding:9px 12px;text-align:center;line-height:1.5}
.auth-success.show{display:block}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:900px){
  nav{padding:0 1.5rem}
  .nav-links{display:none}
  .hamburger{display:flex}
  .about-grid{grid-template-columns:1fr;gap:2.5rem}
  .conf-card{grid-template-columns:1fr}
  .conf-info{border-right:none;border-bottom:1px solid rgba(201,168,76,.12)}
  .form-row{grid-template-columns:1fr}
  .auth-row{grid-template-columns:1fr}
}
@media(max-width:600px){
  .hero-title{font-size:2.6rem}
  section{padding:70px 1.2rem}
  .conf-info,.conf-register{padding:2rem 1.5rem}
  .modal{padding:1.8rem}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="#" class="nav-logo">
    <img src="logo.png" alt="Omni MUN logo" />
    <span class="nav-wordmark">Omni MUN</span>
  </a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#conferences">Conferences</a></li>
    <li><a href="#history">History</a></li>
    <li><a href="#instagram">Updates</a></li>
    <li><a href="#" id="nav-signin-btn" class="nav-cta">Sign In</a></li>
  </ul>
  <div class="user-pill" id="user-pill">
    <div class="user-avatar" id="user-avatar">?</div>
    <span style="font-size:.82rem;font-weight:500;color:var(--off-white)" id="user-name-pill"></span>
    <span style="color:var(--muted);font-size:.75rem;margin-left:2px">▾</span>
  </div>
  <button class="hamburger" id="hamburger" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="mobile-menu" id="mobile-menu">
  <a href="#about" onclick="closeMobile()">About</a>
  <a href="#conferences" onclick="closeMobile()">Conferences</a>
  <a href="#history" onclick="closeMobile()">History</a>
  <a href="#instagram" onclick="closeMobile()">Updates</a>
  <a href="#" onclick="closeMobile();openAuthModal('signin')">Sign In / Register</a>
</div>

<!-- HERO -->
<section class="hero" id="hero">
  <div class="hero-rings"></div>
  <img src="logo.png" alt="Omni MUN logo" class="hero-logo" />
  <p class="hero-eyebrow">Northern California's Independent Delegation</p>
  <h1 class="hero-title">Omni<br/><span>MUN</span></h1>
  <p class="hero-sub">Compete at the highest level. Build lifelong skills in diplomacy, public speaking, and global leadership.</p>
  <div class="hero-btns">
    <a href="#conferences" class="btn-primary">View Conferences</a>
    <a href="#about" class="btn-outline">About Us</a>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <div class="container">
    <div class="about-grid">
      <div class="about-text">
        <p class="section-label">Who We Are</p>
        <h2 class="section-title">An independent delegation built for NorCal delegates.</h2>
        <div class="section-divider"></div>
        <p>Omni MUN is a student-run independent delegation based in Northern California. We send delegates to top-tier Model UN conferences up and down the state, competing against the best delegations in the country.</p>
        <p>Whether you're a first-time delegate or a seasoned chair, Omni MUN gives you the structure, coaching, and community to perform your best on the floor.</p>
        <a href="#conferences" class="btn-primary" style="margin-top:1.2rem">Register for a Conference</a>
      </div>
      <div class="about-stats">
        <div class="stat-card"><div class="stat-num">NorCal</div><div class="stat-label">Home Region</div></div>
        <div class="stat-card"><div class="stat-num">Indep.</div><div class="stat-label">Delegation</div></div>
        <div class="stat-card"><div class="stat-num">Top</div><div class="stat-label">Conferences</div></div>
        <div class="stat-card"><div class="stat-num">All</div><div class="stat-label">Levels Welcome</div></div>
      </div>
    </div>
  </div>
</section>

<!-- CONFERENCES -->
<section id="conferences">
  <div class="container">
    <p class="section-label">Upcoming Conferences</p>
    <h2 class="section-title">Register for a Conference</h2>
    <div class="section-divider"></div>
    <div class="conf-card">
      <div class="conf-info">
        <span class="conf-badge">Now Open</span>
        <h3 class="conf-title">SMUNC XXX</h3>
        <p class="conf-host">Stanford University · Stanford, CA</p>
        <ul class="conf-details">
          <li>Hosted at Stanford University</li>
          <li>Open to all experience levels</li>
          <li>Competitive awards in every committee</li>
          <li>Omni MUN delegation coaching included</li>
        </ul>
        <p style="font-size:.8rem;color:var(--muted)">Fill out the registration form to secure your spot with Omni MUN's delegation at SMUNC XXX.</p>
      </div>
      <div class="conf-register">
        <h3>Join Omni MUN at SMUNC XXX</h3>

        <!-- logged out state -->
        <div id="reg-logged-out">
          <p>Create a free account to register for conferences and track your delegation status.</p>
          <div style="display:flex;gap:.8rem;flex-wrap:wrap;margin-top:.8rem">
            <button class="btn-primary" onclick="openAuthModal('signup')" style="font-size:.82rem;padding:11px 22px">Create Account</button>
            <button class="btn-outline" onclick="openAuthModal('signin')" style="font-size:.82rem;padding:11px 22px">Sign In</button>
          </div>
        </div>

        <!-- logged in + not yet registered -->
        <form class="reg-form" id="reg-form" style="display:none" novalidate>
          <div class="auth-error" id="reg-error"></div>
          <div class="form-row">
            <div class="form-group">
              <label for="r-exp">Experience Level</label>
              <select id="r-exp">
                <option value="">Select...</option>
                <option>First conference</option>
                <option>1-2 conferences</option>
                <option>3-5 conferences</option>
                <option>6+ conferences</option>
              </select>
            </div>
            <div class="form-group">
              <label for="r-role">Preferred Role</label>
              <select id="r-role">
                <option value="">Select...</option>
                <option>Delegate</option>
                <option>Chair</option>
                <option>Either</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="r-committees">Committee preferences (optional)</label>
            <textarea id="r-committees" placeholder="Any committees you're aiming for..."></textarea>
          </div>
          <button type="submit" class="form-submit" id="reg-submit">Submit Registration &rarr;</button>
        </form>

        <div class="form-success" id="form-success">
          &#10022; Registration received! We'll be in touch with confirmation and next steps. Welcome to Omni MUN.
        </div>
      </div>
    </div>
  </div>
</section>

<!-- CONFERENCE HISTORY -->
<section id="history" style="background:var(--charcoal)">
  <div class="container">
    <p class="section-label">Our Track Record</p>
    <h2 class="section-title">Conference History</h2>
    <div class="section-divider"></div>
    <div style="display:flex;flex-direction:column;gap:0">
      <div style="display:grid;grid-template-columns:80px 1fr;gap:0 2rem;align-items:stretch">
        <!-- 2025 -->
        <div style="text-align:right;padding-top:4px">
          <span style="font-family:var(--serif);font-size:1.3rem;font-weight:700;color:var(--gold)">2025</span>
        </div>
        <div style="border-left:2px solid rgba(201,168,76,.25);padding-left:2rem;padding-bottom:2.5rem;display:flex;flex-direction:column;gap:1rem">
          <div style="position:relative">
            <div style="position:absolute;left:-2.5rem;top:6px;width:10px;height:10px;border-radius:50%;background:var(--gold);border:2px solid var(--charcoal)"></div>
            <p style="font-size:.72rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem">UC Los Angeles</p>
            <p style="font-family:var(--serif);font-size:1.3rem;font-weight:700;color:var(--white)">BruinMUN</p>
          </div>
          <div style="position:relative">
            <div style="position:absolute;left:-2.5rem;top:6px;width:10px;height:10px;border-radius:50%;background:var(--gold);border:2px solid var(--charcoal)"></div>
            <p style="font-size:.72rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem">UC Berkeley</p>
            <p style="font-family:var(--serif);font-size:1.3rem;font-weight:700;color:var(--white)">BearMUN</p>
          </div>
        </div>
        <!-- 2026 -->
        <div style="text-align:right;padding-top:4px">
          <span style="font-family:var(--serif);font-size:1.3rem;font-weight:700;color:var(--gold)">2026</span>
        </div>
        <div style="border-left:2px solid rgba(201,168,76,.25);padding-left:2rem;padding-bottom:1rem;display:flex;flex-direction:column;gap:1rem">
          <div style="position:relative">

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://fqdzvjguxjjhaahqyzws.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxZHp2amd1eGpqaGFhaHF5endzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NDM1MTgsImV4cCI6MjA5NjAxOTUxOH0.5qFUKd12rJJdzy3pJ7kgadZohmP7eTOeJTXyAdfkuJ0'
);

let currentUser = null;

sb.auth.onAuthStateChange(async (event, session) => {
  currentUser = session?.user ?? null;
  await updateUI();
});

async function updateUI() {
  const signinBtn = document.getElementById('nav-signin-btn');
  const pill = document.getElementById('user-pill');
  const avatarEl = document.getElementById('user-avatar');
  const nameEl = document.getElementById('user-name-pill');
  const regOut = document.getElementById('reg-logged-out');
  const regForm = document.getElementById('reg-form');
  const formSuccess = document.getElementById('form-success');

  if (currentUser) {
    const { data: profile } = await sb.from('profiles').select('full_name').eq('id', currentUser.id).single();
    const fullName = profile?.full_name || currentUser.email;
    const initials = fullName.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    signinBtn.style.display = 'none';
    pill.classList.add('visible');
    avatarEl.textContent = initials;
    nameEl.textContent = fullName.split(' ')[0];
    regOut.style.display = 'none';
    const submitted = localStorage.getItem('om_reg_smuncxxx_' + currentUser.id);
    if (submitted) {
      regForm.style.display = 'none';
      formSuccess.style.display = 'block';
    } else {
      regForm.style.display = 'flex';
      formSuccess.style.display = 'none';
    }
  } else {
    signinBtn.style.display = '';
    pill.classList.remove('visible');
    regOut.style.display = 'block';
    regForm.style.display = 'none';
    formSuccess.style.display = 'none';
  }
}

function openAuthModal(tab) {
  switchTab(tab || 'signin');
  document.getElementById('auth-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeAuthModal() {
  document.getElementById('auth-modal').classList.remove('open');
  document.body.style.overflow = '';
}
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
}

document.getElementById('nav-signin-btn').addEventListener('click', e => { e.preventDefault(); openAuthModal('signin'); });
document.getElementById('modal-close-btn').addEventListener('click', closeAuthModal);
document.getElementById('auth-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeAuthModal(); });
document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
document.getElementById('user-pill').addEventListener('click', async () => {
  if (confirm('Sign out of Omni MUN?')) await sb.auth.signOut();
});

// Sign In
document.getElementById('signin-btn').addEventListener('click', async () => {
  const email = document.getElementById('si-email').value.trim();
  const pw = document.getElementById('si-password').value;
  const errEl = document.getElementById('signin-error');
  const btn = document.getElementById('signin-btn');
  errEl.classList.remove('show');
  if (!email || !pw) { errEl.textContent = 'Please fill in all fields.'; errEl.classList.add('show'); return; }
  btn.disabled = true; btn.textContent = 'Signing in...';
  const { error } = await sb.auth.signInWithPassword({ email, password: pw });
  btn.disabled = false; btn.textContent = 'Sign In';
  if (error) { errEl.textContent = error.message; errEl.classList.add('show'); return; }
  closeAuthModal();
});

// Sign Up
document.getElementById('signup-btn').addEventListener('click', async () => {
  const first = document.getElementById('su-first').value.trim();
  const last = document.getElementById('su-last').value.trim();
  const grade = document.getElementById('su-grade').value;
  const school = document.getElementById('su-school').value.trim();
  const email = document.getElementById('su-email').value.trim();
  const phone = document.getElementById('su-phone').value.trim();
  const pw = document.getElementById('su-password').value;
  const pw2 = document.getElementById('su-confirm').value;
  const errEl = document.getElementById('signup-error');
  const succEl = document.getElementById('signup-success');
  const btn = document.getElementById('signup-btn');
  errEl.classList.remove('show'); succEl.classList.remove('show');
  if (!first || !last || !grade || !school || !email || !phone || !pw) {
    errEl.textContent = 'Please fill in all fields.'; errEl.classList.add('show'); return;
  }
  if (pw !== pw2) { errEl.textContent = 'Passwords do not match.'; errEl.classList.add('show'); return; }
  if (pw.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.classList.add('show'); return; }
  btn.disabled = true; btn.textContent = 'Creating account...';
  const { data, error } = await sb.auth.signUp({
    email, password: pw,
    options: { data: { full_name: first + ' ' + last, grade, school, phone } }
  });
  if (error) {
    btn.disabled = false; btn.textContent = 'Create Account';
    errEl.textContent = error.message; errEl.classList.add('show'); return;
  }
  if (data.user) {
    await sb.from('profiles').upsert({ id: data.user.id, full_name: first + ' ' + last, grade, school, phone });
  }
  btn.disabled = false; btn.textContent = 'Create Account';
  if (data.session) {
    closeAuthModal();
  } else {
    succEl.textContent = 'Check your email to confirm your account, then sign in.';
    succEl.classList.add('show');
  }
});

// Conference Registration
document.getElementById('reg-form').addEventListener('submit', async e => {
  e.preventDefault();
  if (!currentUser) return;
  const exp = document.getElementById('r-exp').value;
  const role = document.getElementById('r-role').value;
  const committees = document.getElementById('r-committees').value;
  const errEl = document.getElementById('reg-error');
  const btn = document.getElementById('reg-submit');
  errEl.classList.remove('show');
  if (!exp || !role) { errEl.textContent = 'Please fill in required fields.'; errEl.classList.add('show'); return; }
  btn.disabled = true; btn.textContent = 'Submitting...';
  await sb.from('registrations').insert({ user_id: currentUser.id, conference: 'SMUNC XXX', experience: exp, preferred_role: role, committee_notes: committees });
  btn.disabled = false; btn.textContent = 'Submit Registration';
  localStorage.setItem('om_reg_smuncxxx_' + currentUser.id, '1');
  document.getElementById('reg-form').style.display = 'none';
  document.getElementById('form-success').style.display = 'block';
});

// Hamburger
document.getElementById('hamburger').addEventListener('click', () => {
  document.getElementById('mobile-menu').classList.toggle('open');
});
function closeMobile() { document.getElementById('mobile-menu').classList.remove('open'); }
<\/script>
